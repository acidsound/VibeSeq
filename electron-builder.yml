appId: ai.vibeseq.studio
productName: VibeSeq
asar: true
npmRebuild: false
compression: maximum
directories:
  output: release
  buildResources: build
files:
  - desktop/main.cjs
  - desktop/model-installer.cjs
  - desktop/cuda-runtime-installer.cjs
  - desktop/muscriptor-importer.cjs
  - desktop/muscriptor-model-bundle.json
  - desktop/port-selection.cjs
  - desktop/preload.cjs
  - desktop/startup-flow.cjs
  - desktop/startup-renderer.js
  - desktop/startup.css
  - desktop/startup.html
  - desktop/stable-audio-model-bundle.json
  - desktop/stable-audio-gpu-model-bundle.json
  - desktop/stable-audio-NOTICE.txt
  - desktop/storage-root.cjs
extraResources:
  - from: dist
    to: studio
    filter:
      - "**/*"
  - from: desktop-out/sidecar/vibeseq-inference
    to: server
    filter:
      - "**/*"
  - from: desktop/cuda-runtime
    to: cuda-runtime/desktop/cuda-runtime
    filter:
      - pyproject.toml
      - uv.lock
  - from: server
    to: cuda-runtime/server
    filter:
      - pyproject.toml
      - "vibeseq_inference/**/*.py"
mac:
  icon: build/icon.icns
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: "${productName}-${version}-macOS-${arch}.${ext}"
  identity: null
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-Windows-${arch}-Setup.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
linux:
  icon: build/icon.png
  category: AudioVideo
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "${productName}-${version}-Linux-${arch}.${ext}"
