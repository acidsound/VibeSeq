name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact: vibeseq-windows-x64
            package_script: desktop:package
            smoke_executable: release/win-unpacked/VibeSeq.exe
          - label: macOS arm64
            os: macos-15
            artifact: vibeseq-macos-arm64
            package_script: desktop:package
            smoke_executable: release/mac-arm64/VibeSeq.app/Contents/MacOS/VibeSeq
          - label: Linux x64
            os: ubuntu-22.04
            artifact: vibeseq-linux-x64
            package_script: desktop:package:linux
            smoke_executable: release/linux-unpacked/vibeseq
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.1"
          enable-cache: true
          cache-dependency-glob: |
            server/uv.lock
            server/desktop-linux-requirements.txt
            desktop/cuda-runtime/uv.lock
      - if: runner.os == 'Windows'
        name: Sync the locked Stable Audio CUDA profile
        shell: pwsh
        run: |
          uv sync --project desktop/cuda-runtime --locked --python 3.12.10 --extra stable-audio --inexact
          uv pip install --python desktop/cuda-runtime/.venv/Scripts/python.exe --no-deps --no-build-isolation --reinstall ./server
      - if: runner.os == 'Windows'
        name: Verify Stable Audio without MuScriptor
        run: >-
          uv run --project desktop/cuda-runtime --locked --no-sync python -c
          "import importlib.util, torch, flash_attn, sentencepiece; from flash_attn import flash_attn_func, flash_attn_kvpacked_func;
          from stable_audio_3 import StableAudioModel;
          from vibeseq_inference.cuda_service import CudaModelManager;
          from vibeseq_inference.stable_audio_cuda_worker import main as worker_main;
          assert importlib.util.find_spec('muscriptor') is None;
          assert torch.__version__ == '2.7.1+cu126'; assert torch.version.cuda == '12.6';
          assert flash_attn.__version__.startswith('2.8.3'); assert callable(flash_attn_func);
          assert callable(flash_attn_kvpacked_func); assert callable(StableAudioModel.from_pretrained);
          assert callable(CudaModelManager.generate);
          assert callable(worker_main)"
      - if: runner.os == 'Windows'
        name: Add the locked MuScriptor CUDA profile
        run: >-
          uv sync --project desktop/cuda-runtime --locked --python 3.12.10
          --extra muscriptor --inexact
      - if: runner.os == 'Windows'
        name: Verify MuScriptor independently without removing Stable Audio
        run: >-
          uv run --project desktop/cuda-runtime --locked --no-sync python -c
          "import torch, muscriptor, flash_attn; from muscriptor import TranscriptionModel;
          from stable_audio_3 import StableAudioModel;
          from vibeseq_inference.muscriptor_cuda_worker import main as worker_main;
          assert torch.__version__ == '2.7.1+cu126'; assert torch.version.cuda == '12.6';
          assert callable(TranscriptionModel.load_model); assert callable(worker_main);
          assert callable(StableAudioModel.from_pretrained)"
      - run: npm ci
      - run: npm run check
      - run: npm run ${{ matrix.package_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - if: runner.os != 'Linux'
        run: npm run desktop:smoke-app -- "${{ matrix.smoke_executable }}"
      - if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run desktop:smoke-app -- "${{ matrix.smoke_executable }}"
      - run: npm run desktop:assert-model-free
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: error
          retention-days: 14

  linux-model-release:
    name: Publish Linux model bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy the verified TFLite files into the Linux-specific release
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_TAG: stable-audio-3-c2949a-windows-x64
          TARGET_TAG: stable-audio-3-c2949a-linux-x64
        run: |
          if gh release view "${TARGET_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "${TARGET_TAG} already exists."
            exit 0
          fi

          bundle="${RUNNER_TEMP}/stable-audio-linux"
          mkdir -p "${bundle}"
          gh release download "${SOURCE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir "${bundle}" \
            --pattern 'LICENSE-Gemma.md' \
            --pattern 'LICENSE-Stability-AI-Community.md' \
            --pattern 'NOTICE.txt' \
            --pattern 'sa3-c2949a-tflite-*'
          cp desktop/stable-audio-model-bundle.json "${bundle}/stable-audio-model-bundle.json"
          gh release create "${TARGET_TAG}" "${bundle}"/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title 'Stable Audio 3 Medium · Linux x64 TFLite · c2949a' \
            --notes 'Linux x64 first-run model bundle. The model files are the official optimized TFLite medium weights used by the CPU/LiteRT runtime. Powered by Stability AI.' \
            --prerelease

  muscriptor-model-release:
    name: Publish universal MuScriptor model bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Download, verify, and publish the pinned model assets
        env:
          GH_TOKEN: ${{ github.token }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TARGET_TAG: muscriptor-medium-f322369
        run: |
          if gh release view "${TARGET_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "${TARGET_TAG} already exists."
            exit 0
          fi

          bundle="${RUNNER_TEMP}/muscriptor-medium"
          mkdir -p "${bundle}"
          node scripts/prepare-muscriptor-release.mjs --output "${bundle}"
          gh release create "${TARGET_TAG}" "${bundle}"/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title 'MuScriptor Medium · all desktop platforms · f322369' \
            --notes 'Digest-pinned MuScriptor Medium model bundle for VibeSeq one-click installation on macOS ARM64, Windows x64, and Linux x64. Developed by Mirelo x Kyutai. Weights are redistributed without modification under CC BY-NC 4.0 and remain noncommercial-only. See MuScriptor-NOTICE.txt.' \
            --latest=false

  release:
    name: Publish release
    needs:
      - build
      - linux-model-release
      - muscriptor-model-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Write release scope
        run: |
          cat > "${RUNNER_TEMP}/release-notes.md" <<'EOF'
          ## VibeSeq __RELEASE_TAG__

          This unsigned release provides the VibeSeq desktop runtime, local persistence, arrangement editing, playback, and export.

          ### Highlights

          - Shift each Audio clip by up to one octave without changing its placement duration, and stretch time independently from 0.125x to 2x using Signalsmith Stretch.
          - Record live input into an armed Audio track while listening to the Arrangement, with automatic browser input/output latency compensation and a manual trim control.
          - Keep multi-pass loop recordings as one unfolded linear take for full editing, with `REC N×`, pitch, and stretch badges directly on the clip.
          - Preserve raw recorded WAV media and apply latency correction as a non-destructive source offset. Waveform cache repair prevents uneven recording lengths from blocking durable saves.

          It embeds the Studio, Stable Audio 3 execution source, a frozen portable CPU runtime, and verified first-run installers, so Node.js, Python, and `uv` do not need to be preinstalled. Model weights and the optional Windows CUDA runtime are not included in the executable.

          On every launch VibeSeq checks the current platform's exact Stable Audio files. If `VibeSeq Data` is absent, empty, incomplete, or missing a required file, the Inference readiness panel offers a resumable SHA-256-verified download after the model terms are accepted:

          - macOS ARM64 MLX bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-c2949a-macos-arm64
          - Windows x64 CPU TFLite bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-c2949a-windows-x64
          - Windows NVIDIA Ampere-or-newer bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-27b5a21-windows-x64-fa2. The app installs an isolated managed Python 3.12 runtime, official PyTorch 2.7.1 CUDA 12.6 wheels, and the digest-pinned community FlashAttention 2.8.3 wheel, runs an actual FlashAttention kernel on the detected GPU, then downloads the exact release checkpoint with the same one-click flow as CPU-only systems.
          - Linux x64 TFLite bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-c2949a-linux-x64
          - MuScriptor Medium, shared by every desktop platform: https://github.com/acidsound/VibeSeq/releases/tag/muscriptor-medium-f322369

          Only the Stable Audio model format selected for the running hardware is downloaded. FlashAttention-compatible NVIDIA hardware must use the CUDA route and never silently downgrades to CPU. CPU-only Windows continues to use the public TFLite route. macOS and Linux store models below `~/VibeSeq Data/models`; Windows stores models and its optional runtime below `VibeSeq Data` beside the installed `VibeSeq.exe`.

          MuScriptor Medium is now available through the same one-click flow on macOS ARM64, Windows x64, and Linux x64. The app downloads the unchanged, digest-pinned public Release assets after the user accepts CC BY-NC 4.0 and the upstream conditions covering noncommercial use, rights in source audio, warranty disclaimer, and indemnification. The installed snapshot includes attribution, the exact upstream source revision, and license links. On NVIDIA Windows systems the same click also installs or repairs the isolated MuScriptor CUDA runtime; system Python is never modified.

          Stable Audio and MuScriptor share the base Python/CUDA PyTorch environment and one persistent managed CUDA service on Windows, but install and verify as independent runtime profiles. Missing or broken MuScriptor packages never block Stable Audio readiness or generation. Stable Audio is loaded once and retains VRAM priority across generations; MuScriptor remains GPU-resident only when measured VRAM headroom allows it and otherwise stays on CPU without evicting Stable Audio. CUDA generation uses the official 8-step schedule and exact requested latent duration instead of generating an extra six seconds. FlashAttention 2 remains specific to Stable Audio, and the service never opens a console window.

          Windows runtime installation clears and refreshes only the pinned FlashAttention wheel cache before synchronization, then automatically retries with an isolated temporary cache if interrupted installation metadata is incomplete. App shutdown terminates the complete sidecar, CUDA Python, and runtime-installer process trees; the persistent CUDA service also watches its parent process so it cannot remain orphaned and block a later Setup update.

          Existing Windows users do not need to uninstall first. Close VibeSeq and run the __RELEASE_VERSION__ Setup over the same installation directory. The installer replaces the application in place and preserves the existing `VibeSeq Data` directory beside the executable.

          Powered by Stability AI.

          Windows is distributed as a current-user assisted NSIS installer so extraction progress is visible and `VibeSeq Data` remains beside the installed executable. The installed app then shows Local data, Audio engine, Health check, and Studio startup stages while its local service starts. Windows SmartScreen and macOS Gatekeeper may warn because code-signing identities are not configured yet. On Linux, run `chmod +x VibeSeq-*.AppImage` before launching. Verify the downloaded asset with `SHA256SUMS.txt` before running it.
          EOF
          sed -i \
            -e "s/__RELEASE_TAG__/${GITHUB_REF_NAME}/g" \
            -e "s/__RELEASE_VERSION__/${GITHUB_REF_NAME#v}/g" \
            "${RUNNER_TEMP}/release-notes.md"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "VibeSeq ${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            --latest
