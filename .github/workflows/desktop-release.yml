name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            artifact: vibeseq-windows-x64
          - label: macOS arm64
            os: macos-15
            artifact: vibeseq-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.1"
          enable-cache: true
          cache-dependency-glob: server/uv.lock
      - run: npm ci
      - run: npm run check
      - run: npm run desktop:package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - run: npm run desktop:assert-model-free
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Write release scope
        run: |
          cat > "${RUNNER_TEMP}/release-notes.md" <<'EOF'
          ## Desktop runtime validation prerelease

          This unsigned prerelease is for clean-machine validation of the VibeSeq desktop runtime, local persistence, arrangement editing, playback, and export.

          It embeds the Studio, Stable Audio 3 execution source, frozen real-model runtime, and the verified first-run model installer, so Node.js, Python, and `uv` are not required. Model weights are not included in the executable.

          On every launch VibeSeq checks the current platform's exact Stable Audio files. If `VibeSeq Data` is absent, empty, incomplete, or missing a required file, the Inference readiness panel offers a resumable SHA-256-verified download after the model terms are accepted:

          - macOS ARM64 MLX bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-c2949a-macos-arm64
          - Windows x64 TFLite bundle: https://github.com/acidsound/VibeSeq/releases/tag/stable-audio-3-c2949a-windows-x64
          - MuScriptor Medium: https://huggingface.co/MuScriptor/muscriptor-medium

          Only the Stable Audio model format for the running OS is downloaded. macOS stores it below `~/VibeSeq Data/models`; the Windows portable build stores it below `VibeSeq Data/models` beside `VibeSeq.exe`.

          MuScriptor remains gated and is not redistributed. Each user accepts its Hugging Face conditions, downloads the pinned `config.json` and `model.safetensors` in their browser, and places them directly under **SAVE CACHE UNDER**. That exact revision folder opens in Finder or File Explorer. VibeSeq does not download, select, or move these files or request or store a Hugging Face token; **Verify files in cache** only validates the files already in that folder.

          Powered by Stability AI.

          Windows SmartScreen and macOS Gatekeeper may warn because code-signing identities are not configured yet. Verify the downloaded asset with `SHA256SUMS.txt` before running it.
          EOF
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "VibeSeq ${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            --prerelease
